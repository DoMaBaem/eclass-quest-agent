services:
  # Docker만으로 실행하는 크로스 플랫폼 배포 모드다. 웹 데스크톱 안에서 TUI와 headed Chromium을
  # 함께 실행하므로 호스트 OS의 GUI·오디오 연결 방식을 따로 설정할 필요가 없다.
  desktop:
    build:
      context: .
      dockerfile: Dockerfile.desktop
    container_name: eclass-quest-desktop
    profiles: ["desktop"]
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Seoul}
      TITLE: E-Class Quest
      START_DOCKER: "false"
      MYSQL_URL: mysql+asyncmy://eclass_app:local_password@mysql:3306/eclass_quest?charset=utf8mb4
      # 기본 Ollama도 Compose 안에서 실행한다. 고급 사용자는 이 값만 외부 주소로 바꿀 수 있다.
      OLLAMA_URL: ${DESKTOP_OLLAMA_URL:-http://ollama:11434/api/chat}
      ECLASS_BASE_URL: ${ECLASS_BASE_URL:-https://learn.hansung.ac.kr}
      ECLASS_DEFAULT_LANGUAGE: ko
      SELKIES_AUDIO_ENABLED: "true"
      SELKIES_MICROPHONE_ENABLED: "false"
      SELKIES_UI_TITLE: E-Class Quest
      SELKIES_MANUAL_WIDTH: ${ECLASS_DESKTOP_WIDTH:-1440}
      SELKIES_MANUAL_HEIGHT: ${ECLASS_DESKTOP_HEIGHT:-900}
      SELKIES_FRAMERATE: ${ECLASS_DESKTOP_FRAMERATE:-30}
    depends_on:
      mysql:
        condition: service_healthy
      ollama-model:
        condition: service_completed_successfully
    ports:
      # HTTPS가 오디오·영상 브라우저 기능에 필요하다. 외부에는 노출하지 않고 로컬에서만 연다.
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data:/app/data
      - desktop_config:/config
    shm_size: "1gb"
    restart: unless-stopped

  app:
    build: .
    profiles: ["app"]
    environment:
      # 컨테이너 안에서는 localhost가 아니라 Compose 서비스 이름으로 DB에 접근한다.
      MYSQL_URL: mysql+asyncmy://eclass_app:local_password@mysql:3306/eclass_quest?charset=utf8mb4
      OLLAMA_URL: ${CONTAINER_OLLAMA_URL:-http://ollama:11434/api/chat}
    depends_on:
      mysql:
        condition: service_healthy
      ollama-model:
        condition: service_completed_successfully
    volumes:
      - ./data:/app/data
    stdin_open: true
    tty: true

  # 문서 분석용 로컬 모델 서버다. 모델 파일은 named volume에 보관되어 컨테이너를 다시
  # 만들어도 유지된다. 기본은 모든 OS에서 동작하는 CPU 모드다.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  # Ollama API가 준비된 뒤 프로젝트가 사용하는 모델을 한 번 받아 둔다. 이미 volume에
  # 존재하는 모델은 즉시 확인만 하므로 이후 실행에서는 긴 다운로드가 반복되지 않는다.
  ollama-model:
    image: curlimages/curl:latest
    entrypoint: ["curl"]
    command:
      - --fail
      - --silent
      - --show-error
      - --max-time
      - "1800"
      - --header
      - "Content-Type: application/json"
      - --data
      - '{"model":"qwen3:0.6b","stream":false}'
      - http://ollama:11434/api/pull
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  mysql:
    image: mysql:8.0
    container_name: eclass-quest-mysql
    environment:
      MYSQL_DATABASE: eclass_quest
      MYSQL_USER: eclass_app
      MYSQL_PASSWORD: local_password
      MYSQL_ROOT_PASSWORD: local_root_password
    ports:
      # 로컬 PC에서만 접근하게 해 개발용 비밀번호가 외부 네트워크에 노출되지 않게 한다.
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-plocal_root_password"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mysql_data:
  desktop_config:
  ollama_data:
